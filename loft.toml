[package]
name    = "dryopea"
version = "0.0.1"
loft    = ">=0.8.5"
description = "Sci-fi free-build / tower-defence with scramble-and-salvage runs"
license = "LGPL-3.0-or-later"

[application]
entry = "src/main.loft"

# Dependencies are intentionally empty until the in-game ground-type
# editor (plans/future/01-ground-editor) starts.  When upstream
# library plans (gridmesh, terrain-heightmap) migrate to their own
# repos / the loft package registry, they will be added here.
#
# Likely future entries (placeholder names):
#   graphics       = "..."
#   gridmesh       = "..."   # from loft-libs-graphics
#   terrain        = "..."   # from loft-libs-world
#   world          = "..."   # from loft-libs-world
[dependencies]
